<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💝 Will You Be My Valentine? 💝</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    
    <div class="wrapper">
        <div class="romantic-card">
            <div class="image-container">
                <img id="main-gif" src="cat1.gif" alt="Cute Cat">
                <div class="image-glow"></div>
            </div>

            <h1 id="question">Do you love me? 🥰</h1>
            <p id="subtext">✨ Every beat of my heart whispers your name ✨</p>

            <div class="btn-group">
                <button id="yes-btn" class="romantic-btn">
                    <span class="btn-text">💖 Yes, I Do! 💖</span>
                </button>
                <button id="no-btn" class="romantic-btn no-btn">
                    <span class="btn-text">😅 No 😅</span>
                </button>
            </div>
            
            <div class="love-meter" id="loveMeter" style="display: none;">
                <div class="love-meter-fill"></div>
                <span class="love-text">❤️ Love Level: 100% ❤️</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
